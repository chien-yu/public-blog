<!doctype html>
<html lang="zh-Hant">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover" />
    <meta name="theme-color" content="#0f766e" />
    <meta name="apple-mobile-web-app-capable" content="yes" />
    <meta name="apple-mobile-web-app-title" content="Swiss Trip" />
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
    <title>旅行月曆</title>
    <link rel="manifest" href="/swiss/manifest.webmanifest" />
    <link rel="icon" href="/swiss/icon.svg" type="image/svg+xml" />
    <link rel="apple-touch-icon" href="/swiss/icon.svg" />
    <link rel="stylesheet" href="/swiss/styles.css" />
  </head>
  <body>
    <div class="sticky-header">
      <header class="topbar">
        <div class="topbar-brand">
          <div>
            <p class="eyebrow">Family Switzerland</p>
            <h1>瑞士家庭旅行</h1>
          </div>
          <div class="topbar-status-group">
            <span id="networkStatus" class="status">檢查中</span>
            <span id="offlineReady" class="status">離線資料尚未確認</span>
          </div>
        </div>

        <div class="topbar-time-control">
          <span class="current-time-display" id="currentTimeDisplay">--</span>
          <label class="toggle-switch compact">
            <input type="checkbox" id="toggleCustomTime" />
            <span>自訂時間</span>
          </label>
          <div class="custom-time-inputs compact" id="customTimeInputs" hidden>
            <input type="datetime-local" id="customDateTime" />
            <input type="text" id="customTimezone" list="timezoneSuggestions" placeholder="時區 (如 Europe/Zurich)" />
            <datalist id="timezoneSuggestions">
              <option value="Europe/Zurich">歐洲中部時間 (瑞士/荷蘭/維也納)</option>
              <option value="Europe/London">英國時間</option>
              <option value="Asia/Taipei">台北時間</option>
              <option value="America/New_York">紐約時間</option>
              <option value="Asia/Tokyo">東京時間</option>
            </datalist>
          </div>
        </div>
      </header>

      <nav class="view-nav" aria-label="頁面切換">
        <a href="/swiss/">時間線</a>
        <a class="active" href="/swiss/calendar.html">Calendar</a>
      </nav>
    </div>

    <main class="app-shell">

      <section>
        <div class="section-title">
          <div>
            <p class="eyebrow">Calendar</p>
            <h2 id="calendarRange">行程月曆</h2>
          </div>
          <button id="refreshButton" type="button">更新離線資料</button>
        </div>
        <div id="calendar" class="calendar-list" aria-live="polite"></div>
      </section>

      <section class="role-panel" aria-label="選擇旅人視角">
        <div>
          <p class="eyebrow">Role</p>
          <h2>選擇視角</h2>
        </div>
        <div id="rolePicker" class="segmented" role="tablist" aria-label="旅人角色"></div>
      </section>
    </main>

    <script src="/swiss/calendar.js" defer></script>
  </body>
</html>
